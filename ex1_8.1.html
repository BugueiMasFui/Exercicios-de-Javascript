<meta charset="utf-8">

 // Exercicio 1.8 Crie um programa que leia a duração de uma viagem em dias e horas. 
 // 
 Calcule e informe a duração total da viagem em número de horas

<script>
    const dias = Number(prompt("N° Dias: "))  // lê os dados de entrada
    const horas = Number(promp("N° horas: ")) 
    const total = (dias *24) + horas          // calcula a duração
    alert('Total de horas: ${total}')         // exibe o total
</script>
