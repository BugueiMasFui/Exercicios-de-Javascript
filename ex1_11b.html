//Elaborar um programa para uma pizzaria, o qual leia o valor total de um conta e quantos clientes vão pagá-la. Calcule e informe o valor a ser pago por cliente.
 <meta charset="UTF-8">
    <title>Exercício 1.11b</title>
    <script>
        const valorTotal = Number(prompt("Digite o valor total da conta:"));
        const numeroClientes = Number(prompt("Digite o número de clientes:"));
        const total = valorTotal / numeroClientes;
        alert(`O valor a ser pago por cliente é: R$ ${total.toFixed(2)}`);

    </script>
